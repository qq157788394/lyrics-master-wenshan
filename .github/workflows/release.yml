name: Release Skill Package

# 推送 v*.*.* tag 时，自动打包为 .zip 并发布到 GitHub Release。
# 打包逻辑直接写在本 workflow 里（参考 master-lyricist 等兄弟 skill 的惯例），
# 不往仓库塞任何 .py 脚本。

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package skill
        run: |
          rm -rf pkg && mkdir -p pkg/lyrics-master-wenshan
          cp skills/lyrics-master-wenshan/SKILL.md README.md pkg/lyrics-master-wenshan/
          cp -r skills/lyrics-master-wenshan/references pkg/lyrics-master-wenshan/
          cp -r skills/lyrics-master-wenshan/templates pkg/lyrics-master-wenshan/
          cd pkg && zip -r "../lyrics-master-wenshan-skill-${GITHUB_REF_NAME}.zip" lyrics-master-wenshan

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lyrics-master-wenshan-skill-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
