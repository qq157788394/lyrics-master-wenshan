name: Validate

# 对 main 分支的 push 与 PR 做 Skill 校验，防止不合格内容合入
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skill
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate frontmatter & structure
        run: python tools/quick_validate.py "skills/lyrics-master-wenshan"

      - name: Package dry-run
        run: python tools/package_skill.py "skills/lyrics-master-wenshan" dist
