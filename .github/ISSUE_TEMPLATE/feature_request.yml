name: Feature request
description: 建议新能力或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 当前有什么不便或缺失，让你想要这个能力？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你的建议
      description: 希望怎么改？越具体越好。
    validations:
      required: true
